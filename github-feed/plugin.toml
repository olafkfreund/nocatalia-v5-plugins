id = "linuxmobile/github-feed"
name = "GitHub Feed"
version = "1.4.0"
min_noctalia = "5.0.0"
author = "linuxmobile"
license = "MIT"
tags = ["Bar", "Launcher", "Development", "Network"]
icon = "brand-github"
description = "Displays GitHub unread notifications count in the bar and followed activity feed in the launcher."

[[setting]]
key = "username"
type = "string"
label = "GitHub Username"
default = ""

[[setting]]
key = "token"
type = "string"
label = "Personal Access Token"
default = ""
description = "Token with 'repo' and 'notifications' scopes for feed & notifications."

[[setting]]
key = "github_url"
type = "string"
label = "Enterprise GitHub URL"
default = ""
description = "Base URL if using GitHub Enterprise Server."

[[setting]]
key = "refresh_interval"
type = "int"
label = "Refresh interval (seconds)"
default = 1800
min = 60
max = 86400

[[setting]]
key = "max_events"
type = "int"
label = "Max feed events"
default = 50
min = 5
max = 100

[[service]]
id = "service"
entry = "service.luau"

[[widget]]
id = "widget"
entry = "widget.luau"

[[launcher_provider]]
id = "launcher"
entry = "launcher.luau"
prefix = "/github"
glyph = "brand-github"
include_in_global_search = false
debounce_ms = 300
