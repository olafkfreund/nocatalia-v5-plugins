id = "color-scheme-creator"
name = "Color Scheme Creator"
version = "2.0.0"
min_noctalia = "5.0.0"
author = "Noctalia Team"
license = "MIT"
tags = ["Theming", "Utility"]
icon = "palette"
description = "Manage and apply color schemes from the launcher"

[[setting]]
key = "iconColor"
type = "string"
label = "Icon Color"
default = "primary"

[[widget]]
id = "widget"
entry = "widget.luau"

[[launcher_provider]]
id = "launcher"
entry = "launcher.luau"
prefix = "/theme"
glyph = "palette"
include_in_global_search = false
debounce_ms = 100
