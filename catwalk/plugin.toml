id = "catwalk"
name = "Catwalk"
version = "1.1.7"
min_noctalia = "5.0.0"
author = "MannuVilasara"
license = "MIT"
tags = ["Bar", "Desktop", "Panel", "Fun"]
icon = "cat"
description = "A cute animated cat for your bar."

[[setting]]
key = "minimumThreshold"
type = "int"
label = "Active Threshold"
default = 10
min = 1
max = 100
description = "CPU usage percentage to switch from sleeping to running"

[[setting]]
key = "hideBackground"
type = "bool"
label = "Hide Background"
default = false
description = "Hide the capsule background behind the cat"

[[service]]
id = "service"
entry = "service.luau"

[[widget]]
id = "widget"
entry = "widget.luau"

[[desktop_widget]]
id = "desktop"
entry = "desktop_widget.luau"
