id = "pir0c0pter0/niri-auto-tile"
name = "Niri Auto Tile"
version = "2.0.0"
min_noctalia = "5.0.0"
author = "pir0c0pter0"
license = "MIT"
tags = ["Bar", "Niri", "Tiling", "Automation"]
icon = "layout-grid"
description = "Automatically tile windows in Niri based on workspace rules. Niri compositor required."

[[setting]]
key = "enabled"
type = "bool"
label = "Enabled"
default = true
description = "Enable auto-tiling"

[[setting]]
key = "maxVisible"
type = "int"
label = "Max visible windows"
default = 4
description = "Maximum windows before switching to stacking"

[[setting]]
key = "debounceMs"
type = "int"
label = "Debounce (ms)"
default = 100
description = "Delay before applying tiling changes"

[[service]]
id = "service"
entry = "service.luau"

[[widget]]
id = "widget"
entry = "widget.luau"
