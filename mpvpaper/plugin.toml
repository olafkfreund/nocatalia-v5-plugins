id = "spiros132/mpvpaper"
name = "mpvpaper"
version = "2.0.0"
min_noctalia = "5.0.0"
author = "spiros132"
license = "MIT"
tags = ["Bar", "Wallpaper", "mpvpaper", "Media"]
icon = "image"
description = "Control mpvpaper animated wallpapers from the bar."

[[setting]]
key = "mpvSocket"
type = "string"
label = "MPV socket path"
default = "/tmp/mpv-socket"
description = "Path to the mpvpaper IPC socket"

[[setting]]
key = "wallpapersFolder"
type = "string"
label = "Wallpapers folder"
default = ""
description = "Path to the wallpapers directory"

[[setting]]
key = "profile"
type = "string"
label = "mpv profile"
default = "default"
description = "mpvpaper playback profile"

[[setting]]
key = "fillMode"
type = "select"
label = "Fill mode"
default = "contain"
description = "How to scale wallpapers"
options = ["contain", "cover", "stretch", "none"]

[[service]]
id = "service"
entry = "service.luau"

[[widget]]
id = "widget"
entry = "widget.luau"
