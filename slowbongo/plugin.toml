id = "tui/slowbongo"
name = "Slowbongo"
version = "2.0.0"
min_noctalia = "5.0.0"
author = "tui"
license = "MIT"
tags = ["Bar", "Audio", "Fun"]
icon = "cat"
description = "A cat that plays bongo drums to the beat of your music."

[[setting]]
key = "idleTimeout"
type = "int"
label = "Idle timeout (ms)"
default = 5000
description = "Time before the cat stops playing"

[[setting]]
key = "catColor"
type = "string"
label = "Cat color"
default = "primary"
description = "Color of the cat emoji in the bar"

[[service]]
id = "service"
entry = "service.luau"

[[widget]]
id = "widget"
entry = "widget.luau"
